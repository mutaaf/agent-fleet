name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
          shellcheck -S warning lib/*.sh bin/fleet

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: bash syntax
        run: bash -n lib/*.sh bin/fleet
      - name: backlog integrity
        run: node scripts/check-backlog.mjs
      - name: prompts present
        run: |
          test -f prompts/ship.prompt.md
          test -f prompts/groom.prompt.md
          test -f prompts/eng.prompt.md
